name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GotifyNotification ${{ github.ref_name }}"
          releaseBody: |
            ## 安装说明

            ### Windows

            | 文件 | 说明 |
            |------|------|
            | `GotifyNotification_*_x64-setup.exe` | NSIS 安装包，双击安装 |
            | `GotifyNotification_portable.zip` | 便携版，解压即用 |

            ### 使用步骤

            1. 安装或解压后运行 GotifyNotification
            2. 在设置中填入 Gotify 服务器地址和客户端令牌
            3. 点击「测试连接」验证
            4. 保存设置，开始接收消息
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Create portable zip
        shell: bash
        run: |
          exe="src-tauri/target/${{ matrix.target }}/release/gotify-notification.exe"
          if [ -f "$exe" ]; then
            cp "$exe" GotifyNotification.exe
            7z a "GotifyNotification_portable.zip" GotifyNotification.exe
          else
            echo "Release exe not found at $exe"
            exit 1
          fi

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.target }}
          path: GotifyNotification_portable.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GotifyNotification_portable.zip
